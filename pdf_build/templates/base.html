<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | FarmSense Investor Materials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
            }
            code, pre {
                font-family: 'JetBrains Mono', monospace;
            }
        }
        @layer components {
            .page-break {
                break-after: page;
            }
            .no-break {
                break-inside: avoid;
            }
        }
    </style>
    <style>
        @page {
            size: A4;
            margin: 15mm;
        }
        @page :first {
            margin: 0;
        }
        .prose-custom h1 {
            @apply text-4xl font-black text-white mb-6 tracking-tight;
        }
        .prose-custom h2 {
            @apply text-2xl font-bold text-white mt-12 mb-4 pb-2 border-b border-emerald-500/20;
        }
        .prose-custom h3 {
            @apply text-lg font-bold text-emerald-400 mt-8 mb-3;
        }
        .prose-custom p {
            @apply text-slate-300 leading-relaxed mb-4;
        }
        .prose-custom ul {
            @apply list-disc list-inside text-slate-300 mb-4 space-y-1;
        }
        .prose-custom ol {
            @apply list-decimal list-inside text-slate-300 mb-4 space-y-1;
        }
        .prose-custom li {
            @apply leading-relaxed;
        }
        .prose-custom strong {
            @apply text-white font-semibold;
        }
        .prose-custom a {
            @apply text-emerald-400 hover:underline;
        }
        .prose-custom blockquote {
            @apply border-l-4 border-emerald-500 pl-4 italic text-slate-400 my-6;
        }
        .prose-custom table {
            @apply w-full text-left border-collapse mb-6;
        }
        .prose-custom th {
            @apply bg-slate-800 text-emerald-400 font-bold text-xs uppercase tracking-widest p-3 border-b border-slate-700;
        }
        .prose-custom td {
            @apply p-3 border-b border-slate-800 text-slate-300;
        }
        .prose-custom tr:hover td {
            @apply bg-slate-800/50;
        }
        .prose-custom code {
            @apply bg-slate-800 text-cyan-400 px-1.5 py-0.5 rounded text-sm;
        }
        .prose-custom pre {
            @apply bg-slate-900 border border-slate-800 p-4 rounded-lg overflow-x-auto mb-4;
        }
        .prose-custom pre code {
            @apply bg-transparent p-0;
        }
        /* Print optimizations */
        @media print {
            .no-print {
                display: none !important;
            }
            .page-break {
                break-after: page;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    {{content}}
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
