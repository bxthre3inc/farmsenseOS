<!-- Section Divider Page -->
<div class="min-h-[297mm] flex items-center justify-center bg-slate-950 relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_#064e3b_0%,_#020617_70%)] opacity-40"></div>
    
    <div class="relative z-10 text-center px-16">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full mb-8">
            <i data-lucide="{{icon}}" class="w-4 h-4 text-emerald-400"></i>
            <span class="text-emerald-400 font-bold text-xs uppercase tracking-widest">Section {{sectionNum}}</span>
        </div>
        <h2 class="text-4xl font-black text-white tracking-tight mb-4">{{sectionTitle}}</h2>
        <p class="text-slate-400 max-w-lg mx-auto">{{sectionDesc}}</p>
        <div class="h-1 w-24 bg-gradient-to-r from-emerald-500 to-cyan-400 mx-auto mt-8 rounded-full"></div>
    </div>
</div>

<div class="page-break"></div>
