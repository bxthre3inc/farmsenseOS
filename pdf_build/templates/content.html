<!-- Content Page Template -->
<div class="min-h-[297mm] bg-slate-950 px-16 py-12">
    <!-- Header -->
    <div class="flex items-center justify-between mb-12 pb-4 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-emerald-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="sprout" class="w-4 h-4 text-emerald-400"></i>
            </div>
            <span class="text-white font-bold">FarmSense</span>
        </div>
        <p class="text-slate-500 text-xs font-medium uppercase tracking-widest">{{title}}</p>
    </div>
    
    <!-- Main content -->
    <div class="prose-custom max-w-none">
        {{body}}
    </div>
    
    <!-- Page number -->
    <div class="fixed bottom-8 right-16 text-slate-600 text-xs font-medium">
        CONFIDENTIAL — {{date}}
    </div>
</div>
